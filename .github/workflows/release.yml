name: Build Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/router-eval" ./cmd/router-eval
          tar -C dist -czf "router-eval-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" router-eval

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: router-eval-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

